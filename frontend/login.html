<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Login - Parvarish AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .role-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .google-btn {
            background: white;
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 16px 24px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .google-btn:hover {
            background: #f8f9fa;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-icon {
            width: 24px;
            height: 24px;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 16px;
            border-radius: 8px;
            text-align: left;
            margin-top: 30px;
        }

        .info-box h3 {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .info-box ul {
            list-style: none;
            padding: 0;
        }

        .info-box li {
            color: #666;
            font-size: 13px;
            margin-bottom: 6px;
            padding-left: 20px;
            position: relative;
        }

        .info-box li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }

        .divider {
            margin: 30px 0;
            text-align: center;
            position: relative;
        }

        .divider:before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #ddd;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: #999;
            font-size: 12px;
        }

        .test-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .test-link:hover {
            text-decoration: underline;
        }

        .status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🌙</div>
        <h1>Parvarish AI</h1>
        <p class="subtitle">Islamic Parenting Assistant</p>
        
        <div class="role-badge">Parent Portal</div>

        <button class="google-btn" onclick="loginWithGoogle()">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>

        <div class="divider">
            <span>OR</span>
        </div>

        <a href="/" class="test-link">← Back to Chatbot</a>

        <div class="info-box">
            <h3>👨‍👩‍👧 For Parents Only</h3>
            <ul>
                <li>One-click registration with Google</li>
                <li>Secure parent account creation</li>
                <li>Manage multiple children</li>
                <li>Monitor child activities</li>
            </ul>
        </div>

        <div id="statusMessage" class="status-message"></div>
    </div>

    <script>
        function loginWithGoogle() {
            // Show loading message
            showStatus('Redirecting to Google...', 'success');
            
            // Redirect to Google OAuth endpoint
            setTimeout(() => {
                window.location.href = 'http://localhost:8000/api/v1/auth/google/login';
            }, 500);
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = `status-message ${type}`;
            statusDiv.style.display = 'block';
        }

        // Check if we're on the callback page (for testing)
        if (window.location.pathname === '/login.html') {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const isNewUser = params.get('new_user');
            
            if (token) {
                // Decode JWT to get user info
                try {
                    const base64Url = token.split('.')[1];
                    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    const payload = JSON.parse(window.atob(base64));
                    
                    showStatus(`✓ Login successful! Welcome ${payload.name || payload.email}`, 'success');
                    
                    // Store token
                    localStorage.setItem('access_token', token);
                    localStorage.setItem('user_role', payload.role);
                    localStorage.setItem('user_email', payload.email);
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        if (isNewUser === 'true') {
                            alert('New parent! In production, redirect to onboarding page.');
                        } else {
                            alert('Welcome back! In production, redirect to parent dashboard.');
                        }
                        window.location.href = '/';
                    }, 2000);
                } catch (e) {
                    showStatus('Error processing login token', 'error');
                }
            }
        }

        // Test API status on load
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('http://localhost:8000/api/v1/auth/google/status');
                const status = await response.json();
                
                if (!status.google_oauth_enabled) {
                    showStatus('⚠️ Google OAuth not configured', 'error');
                }
            } catch (e) {
                console.log('Could not check OAuth status');
            }
        });
    </script>
</body>
</html>
