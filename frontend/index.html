<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parvarish AI - Islamic Parenting Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>🌙 Parvarish AI</h1>
                <p class="subtitle">Your Islamic Parenting Assistant</p>
            </div>
        </header>

        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer">
            <!-- Welcome Message -->
            <div class="message bot-message">
                <div class="message-content">
                    <strong>Parvarish AI:</strong>
                    <p>As-salamu alaykum! 👋 I'm Parvarish AI, your Islamic parenting assistant. I'm here to provide guidance based on Quranic verses, Hadith, and Prophet stories.</p>
                    <p>Ask me anything about raising children in an Islamic way!</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <form id="chatForm" class="chat-form">
                <textarea 
                    id="userInput" 
                    class="chat-input" 
                    placeholder="Ask a question about Islamic parenting..."
                    rows="1"
                ></textarea>
                <button type="submit" class="send-button" id="sendButton">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
