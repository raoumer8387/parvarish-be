[pytest]
# cov-fail-under is set in CI only; a subset of tests cannot satisfy a whole-app threshold.
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: pure unit tests
    endpoint: API endpoint tests
    integration: db/integration style tests
    external: tests requiring external services/network
addopts =
    -q
    -m "not external"
    --cov=app
    --cov-config=.coveragerc
    --cov-report=term-missing
    --cov-report=html:reports/coverage_html
    --html=reports/pytest_report.html
    --self-contained-html
    --junitxml=reports/junit.xml
